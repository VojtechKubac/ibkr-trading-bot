name: Address CodeRabbit Review

on:
  pull_request_review:
    types: [submitted]

jobs:
  address:
    if: github.event.review.user.login == 'coderabbitai[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude Code"
          git config user.email "claude-code@anthropic.com"

      - name: Address CodeRabbit review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          claude --dangerously-skip-permissions -p "
          A CodeRabbit review has just been submitted on PR #${PR_NUMBER} (branch: ${PR_BRANCH}) in ${REPO}.

          Steps:
          1. Fetch all review comments:
             gh api repos/${REPO}/pulls/${PR_NUMBER}/reviews
             gh api repos/${REPO}/pulls/${PR_NUMBER}/comments
             gh api repos/${REPO}/issues/${PR_NUMBER}/comments
          2. Identify every finding CodeRabbit flagged (actionable and nitpick).
          3. Address each one by editing the relevant files in the current working directory.
          4. After all edits, verify: ruff check . && mypy trading_bot/ main.py && pytest
          5. If verification passes, commit all changes:
             git add -A
             git commit -m 'Address CodeRabbit review on PR #${PR_NUMBER}'
          6. Push: git push origin ${PR_BRANCH}

          The repo is already checked out at the PR branch. Only fix what CodeRabbit flagged — do not refactor unrelated code.
          If there is nothing to fix (all comments already resolved), do nothing.
          "
